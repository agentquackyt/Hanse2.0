<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Architect - Canvas Edition</title>
    <style>
        :root { --harbor-red: #ff4757; --node-blue: #007bff; --bg-light: #f0f2f5; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg-light); color: #333; overflow: hidden; }
        
        .sidebar { width: 380px; background: white; display: flex; flex-direction: column; border-right: 1px solid #ddd; padding: 25px; box-sizing: border-box; overflow-y: auto; box-shadow: 2px 0 10px rgba(0,0,0,0.05); z-index: 20; }
        h2 { font-size: 1.3rem; margin-top: 0; color: #1a1a1b; border-bottom: 2px solid var(--node-blue); padding-bottom: 10px; }
        .section { margin-bottom: 25px; }
        
        .input-group { margin-bottom: 15px; display: flex; flex-direction: column; gap: 6px; }
        label { font-size: 0.85rem; font-weight: 600; color: #555; }
        input[type="text"], input[type="file"], select { padding: 10px; border: 1px solid #d1d1d1; border-radius: 6px; font-size: 0.9rem; }
        .check-row { display: flex; align-items: center; gap: 10px; font-size: 0.9rem; margin-top: 5px; cursor: pointer; }
        
        .btn-stack { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        .btn-row { display: flex; gap: 5px; }
        button { padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: background 0.2s; flex: 1; }
        .btn-primary { background: var(--node-blue); color: white; }
        .btn-secondary { background: #6c757d; color: white; }
        .btn-export { background: #28a745; color: white; }
        .btn-edge { background: #6f42c1; color: white; }
        button:hover { filter: brightness(90%); }

        .map-container { flex-grow: 1; position: relative; overflow: hidden; background: #ddd; }
        
        #mapCanvas { 
            display: block; 
            cursor: crosshair; 
        }
        #mapCanvas:active {
            cursor: grabbing;
        }

        #edge-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); z-index: 100; min-width: 320px; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 99; }
        
        .filter-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .points-table { width: 100%; font-size: 0.85rem; border-collapse: collapse; }
        .points-table th { text-align: left; border-bottom: 1px solid #eee; padding-bottom: 8px; color: #888; }
        .points-table td { padding: 8px 0; border-bottom: 1px solid #f9f9f9; }
        .edit-input { width: 100%; border: 1px solid transparent; padding: 4px; border-radius: 4px; font-weight: 500; }
        .edit-input:focus { border-color: #ddd; outline: none; background: #fff; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Network Architect</h2>
        
        <div class="section">
            <div class="input-group">
                <label>1. Map File</label>
                <input type="file" id="imageInput" accept="image/*">
            </div>
            <div class="input-group">
                <label>Restore JSON Data</label>
                <input type="file" id="jsonInput" accept=".json">
            </div>
            <p style="font-size: 0.8rem; color: #666; margin-top: 8px;">Scroll to zoom. Right-click and drag to pan. Left-click to place nodes.</p>
        </div>

        <div class="section">
            <label>2. Node Configuration</label>
            <div class="input-group" style="margin-top: 10px;">
                <input type="text" id="pointTitle" placeholder="Location Name">
            </div>
            <div class="input-group">
                <input type="text" id="defaultPattern" value="Point %id%">
            </div>
            <label class="check-row">
                <input type="checkbox" id="isHarbor"> <strong>Harbor</strong> (Large Red Marker)
            </label>
            <label class="check-row">
                <input type="checkbox" id="autoEdge"> Auto-link to previous point
            </label>
        </div>

        <div class="section">
            <label>3. Advanced Actions</label>
            <div class="btn-stack">
                <button class="btn-edge" onclick="openEdgeModal()">Manual Connection</button>
                <button class="btn-export" onclick="exportData('points')">Export Points</button>
                <button class="btn-export" onclick="exportData('edges')">Export Edges</button>
                <button class="btn-export" onclick="exportData('complete')" style="background:#212529">Export Complete JSON</button>
            </div>
        </div>

        <div class="section" style="border:none">
            <div class="filter-container">
                <label>Registry List</label>
                <select id="typeFilter" onchange="renderTableOnly()" style="padding: 4px; font-size: 0.8rem; width: auto;">
                    <option value="all">Show All</option>
                    <option value="harbor">Harbors Only</option>
                    <option value="node">Travel Nodes Only</option>
                </select>
            </div>
            <table class="points-table">
                <thead><tr><th>Name</th><th>Type</th></tr></thead>
                <tbody id="registryBody"></tbody>
            </table>
        </div>
    </div>

    <div class="map-container" id="mapContainer">
        <canvas id="mapCanvas"></canvas>
    </div>

    <div class="modal-overlay" id="overlay"></div>
    <div id="edge-modal">
        <h3 style="margin-top:0">Create New Connection</h3>
        <div class="input-group">
            <label>Source Node</label>
            <select id="selectStart"></select>
        </div>
        <div class="input-group">
            <label>Destination Node</label>
            <select id="selectEnd"></select>
        </div>
        <div class="btn-row" style="margin-top: 20px;">
            <button class="btn-primary" onclick="createEdgeManual()">Add Link</button>
            <button onclick="closeEdgeModal()" style="background:#eee; color:#333;">Close</button>
        </div>
    </div>

    <script>
        const imageInput = document.getElementById('imageInput');
        const jsonInput = document.getElementById('jsonInput');
        const pointTitleInput = document.getElementById('pointTitle');
        const defaultPatternInput = document.getElementById('defaultPattern');
        const isHarborCheck = document.getElementById('isHarbor');
        const autoEdgeCheck = document.getElementById('autoEdge');
        const registryBody = document.getElementById('registryBody');
        const typeFilter = document.getElementById('typeFilter');
        
        const canvas = document.getElementById('mapCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('mapContainer');

        let pointsArray = [];
        let edgesArray = [];
        let pointCounter = 1;
        
        let mapImage = new Image();
        let currentZoom = 1;
        let offsetX = 0;
        let offsetY = 0;

        // Pan and drag state
        let isDragging = false;
        let dragStartX = 0;
        let dragStartY = 0;
        let initialOffsetX = 0;
        let initialOffsetY = 0;

        // Initialize canvas size to fill container
        function resizeCanvas() {
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            drawMap();
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Load image
        imageInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    mapImage.onload = () => {
                        pointsArray = [];
                        edgesArray = [];
                        resetZoom();
                        renderTableOnly();
                    };
                    mapImage.src = event.target.result;
                };
                reader.readAsDataURL(file);
            }
        });

        function drawMap() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (!mapImage.src || !mapImage.width) return;

            const scaledWidth = mapImage.width * currentZoom;
            const scaledHeight = mapImage.height * currentZoom;

            // Draw Base Image
            ctx.drawImage(mapImage, offsetX, offsetY, scaledWidth, scaledHeight);

            // Draw Edges
            ctx.lineWidth = 3;
            ctx.strokeStyle = "rgba(0, 123, 255, 0.4)";
            edgesArray.forEach(edge => {
                const p1 = pointsArray.find(p => p.id === edge.startId);
                const p2 = pointsArray.find(p => p.id === edge.endId);
                if (p1 && p2) {
                    const x1 = (p1.x * scaledWidth) + offsetX;
                    const y1 = (p1.y * scaledHeight) + offsetY;
                    const x2 = (p2.x * scaledWidth) + offsetX;
                    const y2 = (p2.y * scaledHeight) + offsetY;
                    
                    ctx.beginPath();
                    ctx.moveTo(x1, y1);
                    ctx.lineTo(x2, y2);
                    ctx.stroke();
                }
            });

            // Draw Points and Labels
            pointsArray.forEach(p => {
                const cx = (p.x * scaledWidth) + offsetX;
                const cy = (p.y * scaledHeight) + offsetY;

                // Marker circle - using strict hex colors instead of CSS variables
                ctx.beginPath();
                ctx.arc(cx, cy, p.isHarbor ? 8 : 4.5, 0, 2 * Math.PI);
                ctx.fillStyle = p.isHarbor ? '#ff4757' : '#007bff';
                ctx.fill();
                ctx.lineWidth = 2;
                ctx.strokeStyle = 'white';
                ctx.stroke();

                // Text Label background
                ctx.font = 'bold 11px sans-serif';
                const textWidth = ctx.measureText(p.title).width;
                ctx.fillStyle = 'rgba(0,0,0,0.85)';
                ctx.fillRect(cx + 8, cy + 2, textWidth + 14, 20); 

                // Text Label
                ctx.fillStyle = 'white';
                ctx.textBaseline = 'top';
                ctx.fillText(p.title, cx + 15, cy + 6);
            });
        }

        // --- Interaction Logic ---

        // Prevent default context menu on right click
        canvas.addEventListener('contextmenu', e => e.preventDefault());

        canvas.addEventListener('mousedown', (e) => {
            if (e.button === 2) { 
                // Right click triggers drag/pan
                isDragging = true;
                dragStartX = e.clientX;
                dragStartY = e.clientY;
                initialOffsetX = offsetX;
                initialOffsetY = offsetY;
            }
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            offsetX = initialOffsetX + (e.clientX - dragStartX);
            offsetY = initialOffsetY + (e.clientY - dragStartY);
            drawMap();
        });

        canvas.addEventListener('mouseup', (e) => {
            if (e.button === 2 && isDragging) {
                // End dragging on right click release
                isDragging = false;
            } else if (e.button === 0) {
                // Left click strictly adds a point
                handleAddPoint(e);
            }
        });

        canvas.addEventListener('wheel', (e) => {
            if (!mapImage.src) return;
            e.preventDefault(); 
            
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            // Determine relative position of mouse over the unscaled image
            const imgX = (mouseX - offsetX) / currentZoom;
            const imgY = (mouseY - offsetY) / currentZoom;

            // Multiplicative zoom for faster, exponential scaling
            const zoomFactor = 1.3;
            let newZoom = e.deltaY < 0 ? currentZoom * zoomFactor : currentZoom / zoomFactor;
            
            if (newZoom < 0.1) newZoom = 0.1;
            if (newZoom > 20) newZoom = 20;

            // Shift offset to keep mouse pointed at the same spot on the map
            offsetX = mouseX - (imgX * newZoom);
            offsetY = mouseY - (imgY * newZoom);
            currentZoom = newZoom;
            
            drawMap();
        }, { passive: false });

        // --- Core Functions ---

        function handleAddPoint(e) {
            if (!mapImage.src || !mapImage.width) return;
            
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            const imgX = (mouseX - offsetX) / currentZoom;
            const imgY = (mouseY - offsetY) / currentZoom;

            const relX = imgX / mapImage.width;
            const relY = imgY / mapImage.height;

            // Ensure click is within image boundaries
            if (relX < 0 || relX > 1 || relY < 0 || relY > 1) return;

            let title = pointTitleInput.value.trim() || defaultPatternInput.value.replace('%id%', pointCounter);
            
            const newPoint = {
                id: 'pt_' + Date.now(),
                title: title,
                x: parseFloat(relX.toFixed(6)),
                y: parseFloat(relY.toFixed(6)),
                isHarbor: isHarborCheck.checked
            };

            if (autoEdgeCheck.checked && pointsArray.length > 0) {
                createEdge(pointsArray[pointsArray.length - 1], newPoint);
            }

            pointsArray.push(newPoint);
            pointCounter++;
            pointTitleInput.value = '';
            
            drawMap();
            renderTableOnly();
        }

        function resetZoom() {
            currentZoom = 1;
            // Center the image if it is smaller than the canvas, otherwise set to top-left
            offsetX = mapImage.width < canvas.width ? (canvas.width - mapImage.width) / 2 : 0;
            offsetY = mapImage.height < canvas.height ? (canvas.height - mapImage.height) / 2 : 0;
            drawMap();
        }

        function createEdge(p1, p2) {
            const dist = Math.sqrt(Math.pow(p1.x - p2.x, 2) + Math.pow(p1.y - p2.y, 2));
            edgesArray.push({
                startId: p1.id,
                endId: p2.id,
                distance: parseFloat(dist.toFixed(6))
            });
        }

        function renderTableOnly() {
            registryBody.innerHTML = '';
            const filterValue = typeFilter.value;

            pointsArray.forEach(p => {
                if (filterValue === 'harbor' && !p.isHarbor) return;
                if (filterValue === 'node' && p.isHarbor) return;

                const tr = document.createElement('tr');
                const nameTd = document.createElement('td');
                const input = document.createElement('input');
                input.value = p.title;
                input.className = 'edit-input';
                input.oninput = (e) => {
                    p.title = e.target.value;
                    drawMap(); // Redraw canvas immediately to reflect text change
                };
                nameTd.appendChild(input);
                
                const typeTd = document.createElement('td');
                typeTd.innerText = p.isHarbor ? 'Harbor' : 'Travel';
                typeTd.style.color = p.isHarbor ? 'var(--harbor-red)' : 'var(--node-blue)';
                typeTd.style.fontWeight = 'bold';

                tr.appendChild(nameTd);
                tr.appendChild(typeTd);
                registryBody.appendChild(tr);
            });
        }

        // --- JSON Data Import/Export ---

        jsonInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                try {
                    const data = JSON.parse(event.target.result);
                    importData(data);
                } catch (err) {
                    alert("Invalid JSON file formatting detected.");
                }
            };
            reader.readAsText(file);
        });

        function importData(data) {
            pointsArray = [];
            edgesArray = [];
            pointCounter = 1;

            if (data.harbour) {
                for (const [title, coords] of Object.entries(data.harbour)) {
                    pointsArray.push({ id: 'pt_' + Date.now() + Math.random().toString(36).substr(2, 5), title: title, x: coords.x, y: coords.y, isHarbor: true });
                    pointCounter++;
                }
            }

            if (data.travel_nodes) {
                for (const [title, coords] of Object.entries(data.travel_nodes)) {
                    pointsArray.push({ id: 'pt_' + Date.now() + Math.random().toString(36).substr(2, 5), title: title, x: coords.x, y: coords.y, isHarbor: false });
                    pointCounter++;
                }
            }

            if (data.edge) {
                data.edge.forEach(e => {
                    const startNode = pointsArray.find(p => p.title === e.start);
                    const endNode = pointsArray.find(p => p.title === e.end);
                    if (startNode && endNode) {
                        edgesArray.push({ startId: startNode.id, endId: endNode.id, distance: e.distance || 0 });
                    }
                });
            }

            drawMap();
            renderTableOnly();
            jsonInput.value = ''; 
        }

        function exportData(type) {
            const output = {};
            if (type === 'points' || type === 'complete') {
                output.harbour = {};
                output.travel_nodes = {};
                pointsArray.forEach(p => {
                    const target = p.isHarbor ? output.harbour : output.travel_nodes;
                    target[p.title] = { x: p.x, y: p.y };
                });
            }
            if (type === 'edges' || type === 'complete') {
                output.edge = edgesArray.map(e => {
                    const pStart = pointsArray.find(p => p.id === e.startId);
                    const pEnd = pointsArray.find(p => p.id === e.endId);
                    return { start: pStart ? pStart.title : 'unknown', end: pEnd ? pEnd.title : 'unknown', distance: e.distance };
                });
            }
            const blob = new Blob([JSON.stringify(output, null, 4)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `map_data_${type}.json`;
            a.click();
        }

        // --- Modals ---

        function openEdgeModal() {
            const startSel = document.getElementById('selectStart');
            const endSel = document.getElementById('selectEnd');
            startSel.innerHTML = endSel.innerHTML = '';
            pointsArray.forEach(p => {
                const opt = `<option value="${p.id}">${p.title}</option>`;
                startSel.innerHTML += opt;
                endSel.innerHTML += opt;
            });
            document.getElementById('edge-modal').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
        }

        function closeEdgeModal() {
            document.getElementById('edge-modal').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
        }

        function createEdgeManual() {
            const sId = document.getElementById('selectStart').value;
            const eId = document.getElementById('selectEnd').value;
            if (sId === eId) return alert("Please select two distinct points.");
            createEdge(pointsArray.find(p => p.id === sId), pointsArray.find(p => p.id === eId));
            closeEdgeModal();
            drawMap();
        }
    </script>
</body>
</html>
